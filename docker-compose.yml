version: '3.9'

services:

  api:
    build: .
    container_name: fraud-api
    command: uvicorn src.api.main:app --host 0.0.0.0 --port 7860
    ports:
      - "7860:7860"

  dashboard:
    build: .
    container_name: fraud-dashboard
    command: streamlit run src/dashboard/app.py --server.port 8501 --server.address 0.0.0.0
    ports:
      - "8501:8501"
    depends_on:
      - api